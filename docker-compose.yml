# Local Postgres for development. The credentials below MUST match the
# DATABASE_URL in .env.example. The `postgres` superuser has CREATEDB, which the
# test harness (a later phase) relies on to create `vibe_starter_test`.
services:
    postgres:
        image: postgres:17
        restart: unless-stopped
        environment:
            POSTGRES_DB: vibe_starter
            POSTGRES_PASSWORD: postgres
            POSTGRES_USER: postgres
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d vibe_starter']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
